<section class="task-suggestion-page">
  <div class="form-card">
    <header class="form-header">
      <h1>Create tasks with AI</h1>
      <a routerLink="/tasks" class="back-link">Back to tasks</a>
    </header>

    @if (errorMessage()) {
      <div class="alert alert-error" role="alert">
        {{ errorMessage() }}
      </div>
    }

    <section class="generate-section">
      <h2 class="section-title">Generate</h2>

      <form [formGroup]="generateForm" (ngSubmit)="onGenerate()" novalidate>
        <div class="form-field">
          <label for="prompt">Prompt</label>
          <textarea
            id="prompt"
            rows="4"
            formControlName="prompt"
            placeholder="Describe the tasks you want to create, e.g. Create 5 tasks to plan onboarding for a new developer"
            [class.invalid]="isGenerateFieldInvalid('prompt')"
          ></textarea>

          @if (isGenerateFieldInvalid('prompt')) {
            <span class="field-error">Prompt is required.</span>
          }
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn-primary"
            [disabled]="isGenerating()"
          >
            @if (isGenerating()) {
              Generating...
            } @else {
              Generate
            }
          </button>
        </div>
      </form>
    </section>

    @if (hasPreview()) {
      <section class="preview-section">
        <h2 class="section-title">Preview &amp; edit</h2>

        <p class="preview-summary">
          Review and edit the generated JSON below before saving.
        </p>

        <div class="form-field">
          <label for="previewJson">Tasks JSON</label>
          <textarea
            id="previewJson"
            class="json-editor"
            rows="16"
            spellcheck="false"
            [value]="previewJson()"
            (input)="onPreviewJsonInput($event)"
          ></textarea>
        </div>

        <div class="form-actions preview-actions">
          <button
            type="button"
            class="btn-primary"
            (click)="onSaveAll()"
            [disabled]="isSubmitting()"
          >
            @if (isSubmitting()) {
              Saving...
            } @else {
              Save All
            }
          </button>

          <button
            type="button"
            class="btn-secondary"
            (click)="onRegenerate()"
            [disabled]="isGenerating()"
          >
            @if (isGenerating()) {
              Regenerating...
            } @else {
              Regenerate
            }
          </button>

          <button type="button" class="btn-secondary" (click)="onBackToTasks()">
            Back to tasks
          </button>
        </div>
      </section>
    }
  </div>
</section>
